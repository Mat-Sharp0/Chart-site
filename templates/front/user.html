<!DOCTYPE html>
{% extends 'front/base.html' %}
{% block content %}

<main>
    <h1>{{user['name']}}</h1>
    <button id="subscribe-button" class="subscribe-button" target-id="{{ user['_id'] }}">
        {% if is_subscribe %}Unsubscribe{% else %}Subscribe{% endif %}
    </button>
    <p>Publications:</p>
    <section class="grid grid-flow-row grid-cols-4 gap-5 p-5">
        {% for chart in user['publications'] %}
        <article class="chart-card">
            <div class="chart-container"><canvas class="chart" config="{{ chart['config'] }}"></canvas></div>
            <h3 class="chart-title">
                <a href="{{ url_for('watch_chart', id=chart['_id']) }}">
                    {{chart['title']}}
                </a>
            </h3>
            <ul class="tag-list">
                {% for tag in chart['tags'] %}
                <li class="">{{tag}}</li>
                {% endfor %}
            </ul>
            <p class="description">{{chart['description']}}</p>

            <p class="author">{{user['name']}}</p>
        </article>
        {% endfor %}

    </section>
</main>

{% endblock %}
