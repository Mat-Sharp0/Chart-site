<!DOCTYPE html>

{% extends 'front/base.html' %}
{% block content %}

<main>
    <section>     
        <section class="grid grid-flow-row grid-cols-4 gap-5 p-5">

            {% for chart in charts %}
            <article class="group relative grow">
                <div>
                    <div class="index-chart-container"><canvas class="chart" config="{{ chart['config'] }}"></canvas></div>
                    <h3 class="mt-3 text-lg/6 font-semibold text-gray-900 group-hover:text-gray-600">
                        <a href="{{ url_for('watch_chart', id=chart['_id']) }}">
                            <span class="absolute inset-0"></span>
                            {{chart['title']}}
                        </a>
                    </h3>
                    <ul class="flex flex-row gap-3">
                        {% for tag in chart['tags'] %}
                           <li class="mt-2 line-clamp-3 text-sm/6 text-gray-600">{{tag}}</li>
                        {% endfor %}
                    </ul>
                    <p class="mt-2 line-clamp-3 text-sm/6 text-gray-600">{{chart['description']}}</p>

                    <p class="mt-2 line-clamp-3 text-sm/6 text-gray-600">{{(users|selectattr("_id", "equalto", chart['author'])|first)['name']}}</p>
                </div>
            </article>
            {% endfor %}

        </section>
    </section>
</main>

{% endblock %}
