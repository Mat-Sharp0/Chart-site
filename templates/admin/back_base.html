<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numbro@2.5.0/dist/numbro.min.js"></script>
    <script src="../../static/module/papaparse.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}">
    <script defer src="{{ url_for('static', filename='script.js')}}"></script>
    <title>Document</title>
</head>

<body class="bg-red-300">
    <header>
        <div class="topbar">
            <a href="/" class="text-2xl">Projet libre</a>
        
            <form action="/search" method="get" class="">
                <input type="text" name="q" placeholder="Recherche" class="">
                <button type="submit" class="">🔎</button>
            </form>

            <nav>
                {% if session['user'] %}
                    <li><a href="/manage_account">Manage Account</a></li>
                {% else %}
                    <li><a href="/signup">Sign up</a></li>
                    <li><a href="/login">Login</a></li>
                {% endif %}
            </nav>
        </div>
        <ul class="sidebar bg-red-500">
            <li><a href="/admin">Home</a></li>
            <li><a href="/admin/reported">Reported content</a></li>
            <li><a href="/">User mode</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </header>


    <div class="main bg-red-500">
        <section>
            {% if error %}
            <h3>{{error}}</h3>
            {% endif %}
        </section>
        {% block content %}
        {% endblock %}
    </div>

    <footer>

    </footer>
</body>
</html>
